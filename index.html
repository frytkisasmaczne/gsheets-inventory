<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSheets Inventory</title>
  <meta name="description" content="Client-side inventory check-in app using Google Sheets and QR scanning." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.0/dist/cdn.min.js" defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: 'Zen Kaku Gothic New', 'IBM Plex Sans', sans-serif;
      background: #0f172a;
      color: #0f172a;
      --bg: #0f172a;
      --surface: #ffffff;
      --surface-strong: #f1f5f9;
      --surface-dark: #0b1220;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #dc2626;
      --radius: 18px;
      --shadow: 0 30px 60px rgba(15, 23, 42, 0.12);
      --glow: 0 20px 40px rgba(37, 99, 235, 0.25);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 55%, #0b1120 100%);
      margin: 0;
      padding: 0;
    }
    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #e2e8f0;
    }
    .app-header {
      padding: 18px 18px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.98) 0%, rgba(15, 23, 42, 0.75) 100%);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }
    .brand-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .brand-sub {
      color: #94a3b8;
      font-size: 0.85rem;
    }
    .nav-tabs {
      display: inline-flex;
      gap: 6px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.25);
      padding: 4px;
      border-radius: 999px;
    }
    .tab {
      border: 0;
      background: transparent;
      color: #cbd5f5;
      padding: 8px 14px;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tab.active {
      background: #e2e8f0;
      color: #0f172a;
      box-shadow: var(--glow);
    }
    .app-main {
      flex: 1;
      padding: 0 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .screen {
      display: none;
      animation: fadeUp 0.3s ease;
    }
    .screen.active { display: block; }
    .camera-shell {
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 24px;
      padding: 16px;
      min-height: 70vh;
      box-shadow: var(--shadow);
    }
    .camera-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .chip {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.5);
      color: #e2e8f0;
      font-size: 0.92rem;
    }
    .camera-stage {
      position: relative;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      min-height: 52vh;
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.15);
    }
    #reader {
      height: 100%;
      min-height: 52vh;
    }
    .camera-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.6);
      color: #e2e8f0;
      font-weight: 600;
      text-align: center;
      padding: 24px;
    }
    .scan-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    .scan-status {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.95rem;
      border: 1px solid transparent;
    }
    .scan-status.error { background: rgba(220, 38, 38, 0.16); border-color: rgba(248, 113, 113, 0.45); color: #fecaca; }
    .scan-status.positive { background: rgba(34, 197, 94, 0.16); border-color: rgba(134, 239, 172, 0.45); color: #bbf7d0; }
    .scan-summary {
      display: grid;
      gap: 10px;
    }
    .summary-card {
      background: rgba(226, 232, 240, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 18px;
      padding: 14px;
      color: #e2e8f0;
    }
    .summary-card.clickable { cursor: pointer; }
    .summary-card.muted { color: #94a3b8; text-align: center; }
    .summary-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.12em; color: #94a3b8; }
    .summary-code { font-size: 1.4rem; font-weight: 700; margin: 6px 0; }
    .summary-meta { display: flex; justify-content: space-between; color: #cbd5f5; font-size: 0.95rem; }
    .summary-time { margin-top: 4px; color: #94a3b8; font-size: 0.85rem; }
    .settings-grid {
      display: grid;
      gap: 16px;
    }
    .settings-card {
      background: #ffffff;
      color: var(--text);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .settings-card h2 { margin: 0 0 12px; font-size: 1.1rem; }
    .settings-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .list { list-style: none; padding: 0; margin: 0; }
    .list-item { padding: 12px 14px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 10px; background: var(--surface-strong); }
    .note { color: var(--muted); font-size: 0.95rem; }
    .status { padding: 12px 16px; border-radius: 14px; background: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe; }
    .status.error { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
    .status.positive { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    .button { border: 0; color: #fff; background: var(--accent); border-radius: 999px; padding: 12px 18px; cursor: pointer; font-weight: 600; transition: transform .15s ease, background .15s ease; }
    .button:hover { background: var(--accent-strong); transform: translateY(-1px); }
    .button-secondary { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }
    .button-secondary:hover { background: #e2e8f0; }
    .button-danger { background: #dc2626; }
    .button-danger:hover { background: #b91c1c; }
    .field { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 14px; font-size: 1rem; color: var(--text); background: #f8fafc; }
    .field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37,99,235,.12); }
    .text-button { background: transparent; border: none; color: var(--accent); cursor: pointer; font-size: .95rem; font-weight: 600; padding: 0; }
    .action-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }
    .action-card {
      background: #ffffff;
      color: var(--text);
      border-radius: 24px;
      padding: 22px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .action-title { text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.75rem; color: var(--muted); }
    .action-code { font-size: 1.8rem; font-weight: 700; margin: 12px 0; }
    .action-sub { color: var(--muted); margin-bottom: 16px; }
    .action-buttons {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .action-buttons .button,
    .action-buttons .button-secondary,
    .action-buttons .button-danger {
      font-size: 1.05rem;
      padding: 16px 18px;
      border-radius: 16px;
      width: 100%;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (min-width: 900px) {
      .settings-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .settings-card.full { grid-column: 1 / -1; }
    }
    @media (max-width: 720px) {
      .scan-controls { grid-template-columns: 1fr; }
      .tab { padding: 8px 12px; }
    }
  </style>
</head>
<body x-data="inventoryApp" x-init="init()">
  <div class="app-shell">
    <header class="app-header">
      <div>
        <div class="brand-title">GSheets Inventory</div>
        <div class="brand-sub">Camera-first inventory</div>
      </div>
      <div class="nav-tabs">
        <button class="tab" :class="activeScreen === 'scan' ? 'active' : ''" @click="activeScreen = 'scan'">Scan</button>
        <button class="tab" :class="activeScreen === 'settings' ? 'active' : ''" @click="activeScreen = 'settings'">Settings</button>
      </div>
    </header>

    <main class="app-main">
      <section class="screen" :class="activeScreen === 'scan' ? 'active' : ''">
        <div class="camera-shell">
          <div class="camera-header">
            <div class="chip" x-text="selectedScanSheet ? 'Scan sheet: ' + selectedScanSheet.name : 'Select a scan sheet in Settings'"></div>
            <button class="button button-secondary" @click="toggleScanner()" x-text="scannerRunning ? 'Stop camera' : 'Start camera'"></button>
          </div>
          <div class="camera-stage">
            <div id="reader" x-show="scannerAvailable"></div>
            <div class="camera-hint" x-show="!scannerRunning">Camera paused. Tap Start.</div>
          </div>
          <div class="scan-controls">
            <input class="field" type="text" placeholder="Type or paste code" x-model="scanCodeText" @keyup.enter="submitManualCode()" />
            <button class="button" @click="submitManualCode()">Submit</button>
          </div>
          <div class="scan-status" x-show="lastScanMessage" :class="lastScanError ? 'error' : 'positive'" x-text="lastScanMessage"></div>
          <div class="scan-summary">
            <template x-if="scannedItems.length > 0">
              <div class="summary-card clickable" @click="handleDetectedCode(scannedItems[0].code)">
                <div class="summary-title">Last action</div>
                <div class="summary-code" x-text="scannedItems[0].code"></div>
                <div class="summary-meta">
                  <span x-text="scannedItems[0].action"></span>
                  <span x-text="'Count: ' + scannedItems[0].count"></span>
                </div>
                <div class="summary-time" x-text="scannedItems[0].timeText"></div>
              </div>
            </template>
            <template x-if="scannedItems.length === 0">
              <div class="summary-card muted">No scan actions yet.</div>
            </template>
          </div>
        </div>
      </section>

      <section class="screen" :class="activeScreen === 'settings' ? 'active' : ''">
        <div class="settings-grid">
          <div class="settings-card">
            <h2>Google Drive</h2>
            <div class="settings-row" style="margin-bottom:12px;">
              <span class="status" :class="statusClass" x-text="statusMessage"></span>
              <span class="chip" x-text="signedIn ? 'Signed in' : 'Signed out'"></span>
            </div>
            <div class="settings-row" style="margin-top:12px;">
              <button class="button" @click="signIn()">Connect Google</button>
              <button type="button" class="button button-secondary" @click="signOut()">Disconnect</button>
            </div>
            <p class="note" style="margin-top:12px;">Authorize this origin in Google Cloud: <strong x-text="currentOrigin"></strong></p>
          </div>

          <div class="settings-card">
            <h2>Sheets</h2>
            <div class="settings-row" style="margin-bottom:8px;">
              <span class="chip" x-text="selectedScanSheet ? 'Scan: ' + selectedScanSheet.name : 'Scan sheet not set'"></span>
              <span class="chip" x-text="selectedMasterSheet ? 'Master: ' + selectedMasterSheet.name : 'Master sheet not set'"></span>
            </div>
            <div class="settings-row" style="margin-bottom:12px;">
              <button class="button button-secondary" @click="refreshDriveSheets()">Refresh sheets</button>
              <button class="button button-secondary" @click="loadMasterValues()" :disabled="!selectedMasterSheet">Reload master</button>
              <button class="button button-secondary" @click="openSelectedSheet(selectedScanSheet)" :disabled="!selectedScanSheet">Open scan sheet</button>
            </div>
            <template x-if="driveSheets.length === 0">
              <div class="status">No spreadsheets found in Drive.</div>
            </template>
            <div class="settings-row" style="align-items:flex-start; gap:14px;">
              <div style="flex:1;">
                <div class="note" style="font-weight:600; margin-bottom:6px;">Scan targets</div>
                <template x-for="sheet in driveSheets.slice(0, 7)" :key="sheet.id">
                  <button class="button button-secondary" style="width:100%; text-align:left; margin-bottom:10px;" @click="setScanSheet(sheet)">
                    <strong x-text="sheet.name"></strong>
                    <div class="note" x-text="formatDate(sheet.modifiedTime)"></div>
                  </button>
                </template>
              </div>
              <div style="flex:1;">
                <div class="note" style="font-weight:600; margin-bottom:6px;">Master lists</div>
                <template x-for="sheet in driveSheets.slice(0, 7)" :key="sheet.id + '-m'">
                  <button class="button button-secondary" style="width:100%; text-align:left; margin-bottom:10px;" @click="setMasterSheet(sheet)">
                    <strong x-text="sheet.name"></strong>
                    <div class="note" x-text="formatDate(sheet.modifiedTime)"></div>
                  </button>
                </template>
              </div>
            </div>
            <div class="settings-row" style="margin-top:12px;">
              <input class="field" style="flex:1;" type="text" placeholder="New sheet name" x-model="newSheetName" />
              <button class="button" @click="createSheet('scan')">Create scan sheet</button>
              <button class="button" @click="createSheet('master')">Create master sheet</button>
            </div>
          </div>

          <div class="settings-card full">
            <h2>Recent sheets</h2>
            <ul class="list">
              <template x-if="(recentSheets || []).length === 0">
                <li class="list-item"><span class="note">No recent sheets saved yet.</span></li>
              </template>
              <template x-for="sheet in (recentSheets || [])" :key="sheet.id">
                <li class="list-item" style="display:grid; gap:10px;">
                  <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
                    <div>
                      <div><strong x-text="sheet.name"></strong></div>
                      <div class="note" x-text="sheet.purpose"></div>
                    </div>
                    <div>
                      <button class="button button-secondary" @click="selectRecent(sheet)">Select</button>
                    </div>
                  </div>
                </li>
              </template>
            </ul>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="action-overlay" x-show="actionOverlayOpen" x-transition>
    <div class="action-card">
      <div class="action-title">Scanned code</div>
      <div class="action-code" x-text="pendingCode"></div>
      <div class="action-sub" x-text="pendingLabel || ''" style="margin-bottom:8px;"></div>
      <div class="action-sub">Choose what to do with this code</div>
      <div class="action-buttons">
        <button class="button" @click="applyScanAction('add')">+1</button>
        <button class="button button-secondary" @click="applyScanAction('subtract')">-1</button>
        <button class="button button-danger" @click="applyScanAction('remove')">remove</button>
        <button class="button button-secondary" @click="dismissAction()">close</button>
      </div>
    </div>
  </div>

  <script>

var tokenClient;
const tokenStorageKey = 'gsinv-token';
var inventoryApp = {
  clientId: '261664134193-ll4kfhrv09q540jce0913hebd9ea8qeb.apps.googleusercontent.com',
  accessToken: '',
  signedIn: false,
  signedInAt: null,
  statusMessage: 'Enter your Google OAuth Client ID to start.',
  statusClass: '',
  driveSheets: [],
  recentSheets: [],
  selectedScanSheet: null,
  selectedMasterSheet: null,
  currentOrigin: '',
  newSheetName: '',
  masterCodes: [],
  masterLookup: {},
  scanCodeText: '',
  lastScanMessage: '',
  lastScanError: false,
  scannedItems: [],
  scanner: null,
  scannerRunning: false,
  scannerAvailable: true,
  showSettings: true,
  activeScreen: 'scan',
  actionOverlayOpen: false,
  pendingCode: '',
  pendingLabel: '',
  resumeAfterAction: false,
  scannerPaused: false,
  init() {
    this.loadSettings();
    this.currentOrigin = window.location.protocol === 'file:' ? 'file://' : location.origin;
    if (window.location.protocol === 'file:' || location.origin === 'null') {
      this.updateStatus('Google login cannot run from file:// origin. Serve the app from HTTP(S) or GitHub Pages and add that origin to your Google OAuth authorized origins.', true);
    } else {
      this.updateStatus('Ready — current origin: ' + this.currentOrigin);
    }
    if (this.isTokenStored()) {
      this.updateStatus('Signed in from saved session. Loading sheets...');
      this.refreshDriveSheets();
      if (this.selectedMasterSheet) {
        this.loadMasterValues();
      }
    }
    this.waitForGis();
  },
  waitForGis() {
    const interval = setInterval(() => {
      if (window.google && google.accounts && google.accounts.oauth2) {
        clearInterval(interval);
        if (this.clientId) {
          this.prepareTokenClient();
        }
      }
    }, 120);
  },
  saveSettings() {
    const payload = {
      clientId: this.clientId || '',
      selectedScanSheet: this.selectedScanSheet,
      selectedMasterSheet: this.selectedMasterSheet,
      recentSheets: this.recentSheets,
    };
    localStorage.setItem('gsinv-settings', JSON.stringify(payload));
  },
  loadSettings() {
    try {
      const raw = localStorage.getItem('gsinv-settings');
      if (!raw) return;
      const payload = JSON.parse(raw);
      this.clientId = payload.clientId || '';
      this.selectedScanSheet = payload.selectedScanSheet || null;
      this.selectedMasterSheet = payload.selectedMasterSheet || null;
      this.recentSheets = Array.isArray(payload.recentSheets) ? payload.recentSheets : [];
    } catch (error) {
      console.warn('Unable to read settings', error);
    }
  },
  isTokenStored() {
    try {
      const raw = sessionStorage.getItem(tokenStorageKey);
      if (!raw) return false;
      const payload = JSON.parse(raw);
      if (!payload.accessToken || !payload.expiresAt) return false;
      if (Date.now() > payload.expiresAt) {
        sessionStorage.removeItem(tokenStorageKey);
        return false;
      }
      this.accessToken = payload.accessToken;
      this.signedIn = true;
      this.signedInAt = payload.signedInAt || new Date().toISOString();
      return true;
    } catch (error) {
      console.warn('Unable to read stored token', error);
      return false;
    }
  },
  storeToken(tokenResponse) {
    const expiresIn = Number(tokenResponse.expires_in || 3600);
    const payload = {
      accessToken: tokenResponse.access_token,
      expiresAt: Date.now() + expiresIn * 1000,
      signedInAt: new Date().toISOString()
    };
    sessionStorage.setItem(tokenStorageKey, JSON.stringify(payload));
  },
  prepareTokenClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: this.clientId,
      scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.metadata.readonly https://www.googleapis.com/auth/spreadsheets',
      callback: this.fumocallback
    });
    console.log("Token client prepared with client ID:", this.clientId);
  },
  fumocallback(tokenResponse) {
    inventoryApp.reallogincallback(tokenResponse);
  },
  reallogincallback(tokenResponse) {
    console.log('Google token response', tokenResponse);
    if (tokenResponse.error) {
      this.updateStatus('Authentication failed. ' + (tokenResponse.error_description || tokenResponse.error), true);
      return;
    }
    if (!tokenResponse.access_token) {
      this.updateStatus('Authentication returned without an access token.', true);
      return;
    }
    this.storeToken(tokenResponse);
    this.accessToken = tokenResponse.access_token;
    this.signedIn = true;
    this.signedInAt = new Date().toISOString();
    this.updateStatus('Connected to Google Drive.');
    this.saveSettings();
    this.refreshDriveSheets();
    if (this.selectedMasterSheet) {
      this.loadMasterValues();
    }
    if (this.selectedScanSheet) {
      this.loadExistingScanItems();
    }
  },
  signIn() {
    if (!this.clientId) {
      this.updateStatus('Please enter a valid Google OAuth Client ID first.', true);
      return;
    }
    if (window.location.protocol === 'file:' || location.origin === 'null') {
      this.updateStatus('Cannot sign in from file:// origin. Use GitHub Pages or a local HTTP server and authorize that origin in Google Cloud.', true);
      return;
    }
    if (!window.google || !google.accounts || !google.accounts.oauth2) {
      this.updateStatus('Google Identity Services is still loading. Please wait.', true);
      return;
    }
    this.prepareTokenClient();
    this.updateStatus('Requesting Google permissions...');
    console.log('Requesting access token with client ID:', this.clientId);
    tokenClient.requestAccessToken();
    console.log('Token client request initiated.');
  },
  signOut() {
    this.accessToken = '';
    this.signedIn = false;
    sessionStorage.removeItem(tokenStorageKey);
    this.updateStatus('Signed out. Refresh the page to clear session if needed.');
  },
  setScanSheet(sheet) {
    this.selectedScanSheet = sheet;
    this.rememberSheet(sheet, 'scan');
    this.saveSettings();
    this.loadExistingScanItems();
    this.updateStatus('Scan sheet selected: ' + sheet.name);
  },
  setMasterSheet(sheet) {
    this.selectedMasterSheet = sheet;
    this.rememberSheet(sheet, 'master');
    this.saveSettings();
    this.loadMasterValues();
    this.updateStatus('Master sheet selected: ' + sheet.name);
  },
  selectRecent(sheet) {
    if (!sheet) return;
    if (sheet.purpose === 'scan') {
      this.setScanSheet(sheet);
    } else if (sheet.purpose === 'master') {
      this.setMasterSheet(sheet);
    } else {
      this.selectedScanSheet = sheet;
      this.saveSettings();
      this.updateStatus('Selected recent sheet: ' + sheet.name);
    }
  },
  rememberSheet(sheet, purpose) {
    if (!sheet) return;
    const existing = this.recentSheets.find(item => item.id === sheet.id && item.purpose === purpose);
    if (!existing) {
      this.recentSheets.unshift({ id: sheet.id, name: sheet.name, purpose, modifiedTime: sheet.modifiedTime });
      if (this.recentSheets.length > 10) this.recentSheets.splice(10);
    }
    this.saveSettings();
  },
  refreshDriveSheets() {
    if (!this.signedIn || !this.accessToken) {
      this.updateStatus('Sign in first to refresh the list of sheets.', true);
      return;
    }
    this.updateStatus('Loading sheets from Google Drive...');
    fetch('https://www.googleapis.com/drive/v3/files?q=mimeType%3D%27application%2Fvnd.google-apps.spreadsheet%27+and+trashed%3Dfalse&orderBy=modifiedTime+desc&pageSize=50&fields=files(id%2Cname%2CmodifiedTime)', {
      headers: { Authorization: 'Bearer ' + this.accessToken }
    })
      .then(response => response.json())
      .then(result => {
        if (result.error) {
          throw new Error(result.error.message || 'Unable to load sheets.');
        }
        this.driveSheets = result.files || [];
        if (this.driveSheets.length === 0) {
          this.updateStatus('No Google Sheets found in Drive.', true);
        } else {
          this.updateStatus('Loaded ' + this.driveSheets.length + ' sheets.');
        }
      })
      .catch(error => {
        console.error(error);
        this.updateStatus(error.message || 'Failed to fetch Google Sheets.', true);
      });
  },
  async createSheet(type) {
    if (!this.signedIn || !this.accessToken) {
      this.updateStatus('Sign in before creating a sheet.', true);
      return;
    }
    const name = this.newSheetName.trim() || (type === 'scan' ? 'Inventory Scan Sheet' : 'Inventory Master Sheet');
    this.updateStatus('Creating new sheet...');
    try {
      const response = await fetch('https://sheets.googleapis.com/v4/spreadsheets', {
        method: 'POST',
        headers: {
          Authorization: 'Bearer ' + this.accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ properties: { title: name } })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message || 'Could not create sheet.');
      const sheet = { id: data.spreadsheetId, name: data.properties.title, modifiedTime: new Date().toISOString() };
      this.driveSheets.unshift(sheet);
      if (type === 'scan') this.setScanSheet(sheet); else this.setMasterSheet(sheet);
      this.newSheetName = '';
      this.updateStatus('Created sheet: ' + sheet.name);
    } catch (error) {
      console.error(error);
      this.updateStatus(error.message || 'Create sheet failed.', true);
    }
  },
  async loadMasterValues() {
    if (!this.selectedMasterSheet || !this.signedIn || !this.accessToken) {
      this.updateStatus('Select a master sheet and sign in first.', true);
      return;
    }
    this.updateStatus('Loading master inventory codes...');
    try {
      const title = await this.getFirstSheetName(this.selectedMasterSheet.id);
      if (!title) throw new Error('Unable to detect sheet name.');
      const rows = await this.fetchSheetRows(this.selectedMasterSheet.id, `${encodeURIComponent(title)}!A:B`);
      this.masterCodes = [];
      this.masterLookup = {};
      rows.forEach(row => {
        const code = String(row[0] || '').trim();
        const label = String(row[1] || '').trim();
        if (code) {
          this.masterCodes.push(code);
          if (label) {
            this.masterLookup[code] = label;
          }
        }
      });
      this.updateStatus('Master list loaded with ' + this.masterCodes.length + ' codes.');
    } catch (error) {
      console.error(error);
      this.masterCodes = [];
      this.masterLookup = {};
      this.updateStatus('Failed to load master list: ' + (error.message || 'unknown error'), true);
    }
  },
  async loadExistingScanItems() {
    if (!this.selectedScanSheet || !this.signedIn || !this.accessToken) return;
    try {
      const title = await this.getFirstSheetName(this.selectedScanSheet.id);
      if (!title) return;
      const rows = await this.fetchSheetRows(this.selectedScanSheet.id, `${encodeURIComponent(title)}!A:C`);
      const codes = rows.filter(row => row[0]);
      this.scannedItems = [];
      codes.reverse().forEach(row => {
        const code = String(row[0] || '').trim();
        const count = Number(row[2] || 0) || 0;
        this.scannedItems.push({ code, action: 'loaded', count, timeStamp: new Date().toISOString(), timeText: 'Loaded from sheet' });
      });
      this.updateStatus('Loaded scan history from selected sheet.');
    } catch (error) {
      console.warn('Could not load scan history', error);
    }
  },
  async getFirstSheetName(sheetId) {
    const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}?fields=sheets(properties(title))`, {
      headers: { Authorization: 'Bearer ' + this.accessToken }
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'Failed to read sheet metadata.');
    return data.sheets?.[0]?.properties?.title || null;
  },
  async fetchSheetValues(sheetId, range) {
    const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}`, {
      headers: { Authorization: 'Bearer ' + this.accessToken }
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'Unable to fetch values.');
    return (data.values || []).map(row => String(row[0] || '').trim()).filter((row, idx) => idx === 0 || row !== '');
  },
  async fetchSheetRows(sheetId, range) {
    const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}`, {
      headers: { Authorization: 'Bearer ' + this.accessToken }
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'Unable to fetch values.');
    return data.values || [];
  },
  async updateSheetRow(title, rowIndex, values) {
    const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${this.selectedScanSheet.id}/values/${encodeURIComponent(title)}!A${rowIndex}:C${rowIndex}?valueInputOption=RAW`, {
      method: 'PUT',
      headers: {
        Authorization: 'Bearer ' + this.accessToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ values: [values] })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'Could not update row.');
  },
  async appendSheetRow(title, values) {
    const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${this.selectedScanSheet.id}/values/${encodeURIComponent(title)}!A:C:append?valueInputOption=RAW`, {
      method: 'POST',
      headers: {
        Authorization: 'Bearer ' + this.accessToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ values: [values] })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'Could not append row.');
  },
  async appendScanRecord(code) {
    if (!this.selectedScanSheet || !this.signedIn || !this.accessToken) return;
    try {
      const title = await this.getFirstSheetName(this.selectedScanSheet.id);
      if (!title) throw new Error('Unable to detect scan sheet name.');
      const result = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${this.selectedScanSheet.id}/values/${encodeURIComponent(title)}!A:A:append?valueInputOption=RAW`, {
        method: 'POST',
        headers: {
          Authorization: 'Bearer ' + this.accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ values: [[code]] })
      });
      const data = await result.json();
      if (data.error) throw new Error(data.error.message || 'Could not append row.');
    } catch (error) {
      console.error(error);
      this.updateStatus('Failed to save code to sheet: ' + (error.message || 'unknown'), true);
    }
  },
  submitManualCode() {
    const rawCode = this.scanCodeText.trim();
    if (!rawCode) {
      this.updateScanStatus('Enter a code before submitting.', true);
      return;
    }
    this.processCode(rawCode);
    this.scanCodeText = '';
  },
  processCode(rawCode) {
    const code = String(rawCode).trim();
    if (!code) return;
    this.handleDetectedCode(code);
  },
  handleDetectedCode(code) {
    if (this.actionOverlayOpen) return;
    this.pendingCode = code;
    this.pendingLabel = this.masterLookup[code] || '';
    this.actionOverlayOpen = true;
    this.pauseScanner();
  },
  dismissAction() {
    this.actionOverlayOpen = false;
    this.pendingCode = '';
    this.pendingLabel = '';
    this.resumeScanner();
  },
  async applyScanAction(action) {
    const code = this.pendingCode;
    if (!code) return;
    // this.actionOverlayOpen = false;
    // this.pendingCode = '';
    // this.pendingLabel = '';
    await this.updateScanSheetCount(code, action);
    // this.resumeScanner();
  },
  recordScanAction(code, action, count) {
    const label = action === 'add' ? 'Added +1' : action === 'subtract' ? 'Subtracted -1' : 'Removed';
    this.scannedItems.unshift({ code, action: label, count, timeStamp: new Date().toISOString(), timeText: new Date().toLocaleTimeString() });
    if (this.scannedItems.length > 100) this.scannedItems.pop();
  },
  async updateScanSheetCount(code, action) {
    if (!this.selectedScanSheet || !this.signedIn || !this.accessToken) {
      this.updateStatus('Select a scan sheet and sign in first.', true);
      this.updateScanStatus('Scan sheet not ready.', true);
      return;
    }
    try {
      const title = await this.getFirstSheetName(this.selectedScanSheet.id);
      if (!title) throw new Error('Unable to detect scan sheet name.');
      const rows = await this.fetchSheetRows(this.selectedScanSheet.id, `${encodeURIComponent(title)}!A:C`);
      let rowIndex = -1;
      let currentCount = 0;
      rows.forEach((row, idx) => {
        const value = String(row[0] || '').trim();
        if (value === code) {
          rowIndex = idx + 1;
          currentCount = Number(row[2] || 0) || 0;
        }
      });
      if (action === 'remove') {
        if (rowIndex === -1) {
          this.updateScanStatus('Code not found in sheet: ' + code, true);
        } else {
          await this.updateSheetRow(title, rowIndex, ['', '', '']);
          this.recordScanAction(code, 'remove', 0);
          this.updateScanStatus('Removed code: ' + code, false);
        }
        return;
      }
      const nextCount = action === 'add' ? currentCount + 1 : currentCount - 1;
      const label = this.masterLookup[code] || '';
      if (rowIndex === -1) {
        await this.appendSheetRow(title, [code, label, String(nextCount)]);
      } else {
        await this.updateSheetRow(title, rowIndex, [code, label, String(nextCount)]);
      }
      this.recordScanAction(code, action, nextCount);
      this.updateScanStatus((action === 'add' ? 'Added +1: ' : 'Subtracted -1: ') + code, false);
    } catch (error) {
      console.error(error);
      this.updateScanStatus('Sheet update failed: ' + (error.message || 'unknown'), true);
    }
  },
  async toggleScanner() {
    if (this.actionOverlayOpen) {
      this.updateScanStatus('Close the action screen before scanning.', true);
      return;
    }
    if (this.scannerRunning) {
      this.stopScanner();
      return;
    }
    if (!this.selectedScanSheet) {
      this.updateStatus('Select a scan sheet before using the camera.', true);
      return;
    }
    try {
      if (!this.scanner) {
        this.scanner = new Html5Qrcode('reader');
      }
      await this.scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 280, height: 280 }, experimentalFeatures: { useBarCodeDetectorIfSupported: true } },
        (decodedText) => { this.processCode(decodedText); }
      );
      this.scannerRunning = true;
      this.scannerPaused = false;
      this.scannerAvailable = true;
      this.updateStatus('Camera ready. Scan a code.')
    } catch (error) {
      console.error(error);
      this.scannerAvailable = false;
      this.updateStatus('Camera unavailable or permission denied.', true);
    }
  },
  async stopScanner() {
    if (this.scanner) {
      await this.scanner.stop();
      this.scanner.clear();
    }
    this.scannerRunning = false;
    this.scannerPaused = false;
  },
  async pauseScanner() {
    this.resumeAfterAction = this.scannerRunning;
    if (!this.scanner || !this.scannerRunning) return;
    if (typeof this.scanner.pause === 'function') {
      this.scanner.pause(true);
      this.scannerPaused = true;
    } else {
      await this.stopScanner();
    }
  },
  async resumeScanner() {
    if (!this.resumeAfterAction) return;
    if (this.scanner && this.scannerPaused && typeof this.scanner.resume === 'function') {
      this.scanner.resume();
      this.scannerPaused = false;
      this.scannerRunning = true;
    } else if (!this.scannerRunning) {
      await this.toggleScanner();
    }
    this.resumeAfterAction = false;
  },
  openSelectedSheet(sheet) {
    if (!sheet) return;
    window.open('https://docs.google.com/spreadsheets/d/' + sheet.id, '_blank');
  },
  updateStatus(message, isError = false) {
    this.statusMessage = message;
    this.statusClass = isError ? 'error' : 'positive';
    if (!message) this.statusClass = '';
  },
  updateScanStatus(message, isError = false) {
    this.lastScanMessage = message;
    this.lastScanError = isError;
    setTimeout(() => { this.lastScanMessage = ''; }, 4200);
  },
  formatDate(value) {
    if (!value) return '';
    const date = new Date(value);
    return isNaN(date.getTime()) ? value : date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
};
  </script>
